<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SnapBox — Hub</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="hub">
  <header>
    <h1>SnapBox <span class="tag">hub</span></h1>
    <div class="pinbox">
      <a href="/history" class="navlink">🗂 History</a>
      <input id="pin" type="password" placeholder="Supervisor PIN" autocomplete="off" />
      <span id="hubStatus" class="status"></span>
    </div>
  </header>

  <main id="board"></main>

  <div id="lightbox" class="lightbox" hidden>
    <img id="lightboxImg" alt="Full photo" />
    <button id="lightboxClose" aria-label="Close">✕</button>
  </div>

  <script src="/hub.js"></script>
</body>
</html>
